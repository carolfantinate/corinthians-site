<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="estilos/reset.css">
    <link rel="stylesheet" href="estilos/header.css">
    <style>
        body {
            overflow-y: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .quiz-container {
            max-width: 700px;
            margin: 15px auto;
            background: #111;
            padding: 20px 30px;
            border-radius: 10px;
            color: white;
            text-align: center;
        }

        .barra-container {
            width: 100%;
            height: 15px;
            background: #333;
            border-radius: 10px;
            margin-bottom: 10px;
            margin-top: 10px;
            overflow: hidden;
        }

        #barraProgresso {
            height: 100%;
            width: 0%;
            background: rgb(189, 189, 189);
            transition: width 0.3s;
        }

        #contador {
            font-size: 14px;
            margin-bottom: 5px;
        }

        .respostas {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 20px 0;
        }

        .respostas button {
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            background-color: white;
        }

        .correta {
            background-color: #518d51 !important;
            color: white;
        }

        .errada {
            background-color: #bc5353 !important;
            color: white;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            background: #bc5353;
            color: white;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 20px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <header>
        <h1 class="titulo-header">SCCP</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="#" class="atual">Quiz</a></li>
                <li><a href="historia.html" >História</a></li>
                <li><a href="titulos.html">Títulos</a></li>
            </ul>
        </nav>
    </header>
    <img src="assets/imgs/logo-branca.png" alt="logo-corinthians" class="logo-corinthians">
    <img src="assets/imgs/cp.png" alt="logo-antiga" class="logo-antiga">

    <main>
        <section class="quiz-container">
            <h2>Teste seus conhecimentos sobre o Corinthians</h2>

            <div class="barra-container">
                <div id="barraProgresso"></div>
            </div>
            <p id="contador"></p>

            <div id="quiz">
                <h3 id="pergunta"></h3>
                <div id="respostas" class="respostas"></div>
            </div>

            <div id="resultado" class="hidden">
                <h3 id="pontuacaoFinal"></h3>
                <button id="btnReiniciar" class="btn">Refazer Quiz</button>
            </div>
        </section>
    </main>
    <script type="module" src="js/quiz.js"></script>
</body>

</html>
